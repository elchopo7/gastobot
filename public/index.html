<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastoBot</title>
</head>

<body>
    
    <header>

    </header>

    <main>

        <form>

            <label for="gasto">Gasto</label>
            <input type="text" name="Gasto" id="gasto" placeholder="Cena fuera">

            <label for="importe">Importe</label>
            <input type="number" name="Importe" id="importe" placeholder="27€">

            <label for="categoria">Categoria</label>
                <select name="Categoria" id="categoria">
                    <option value="comida">Comida</option>
                    <option value="suscripcion">Suscripcion</option>
                    <option value="transporte">Transporte</option>
                    <option value="regalo">Regalo</option>
                    <option value="entretenimiento">Entretenimiento</option>
                    <option value="ropa">Ropa</option>
                    <option value="deporte">Deporte</option>
                    <option value="inversion">Inversion</option>
                    <option value="otros">Otros</option>
                </select>

            <label for="descripcion">Descripcion</label>
            <input type="text" name="Descripcion" id="descripcion" placeholder="Cena fuera con amigos">
            
            <label for="fecha">Fecha</label>
            <input type="date" name="Fecha" id="fecha">

        </form>

    </main>

</body>

</html>
