<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastoBot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>

<body>
    
    <header>
            <h1>GastoBot</h1>
    </header>

    <main>

        <section class="summary-card">
            <p class="summary-card__label">Spent last month</p>
            <h2 class="summary-card__amount">€1,245.80</h2>
            <p class="summary-card__note">Based on your recorded expenses</p>
        </section>


        <div class="container">
            <h1>New Expense</h1>

            <form id="expense-form">
                
                <div>
                    <label for="amount">Amount</label>
                    <input 
                    type="number" 
                    id="amount" 
                    name="amount" 
                    placeholder="0.00" 
                    step="0.01"
                    required 
                    />
                </div>

                <div>
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                    <option value="">Select a category</option>
                    <option value="food">Food</option>
                    <option value="transport">Transport</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="housing">Housing</option>
                    <option value="health">Health</option>
                    <option value="education">Education</option>
                    <option value="shopping">Shopping</option>
                    <option value="other">Other</option>
                    </select>
                </div>

                <div>
                    <label for="description">Description</label>
                    <input 
                    type="text" 
                    id="description" 
                    name="description" 
                    placeholder="e.g. dinner with friends" 
                    />
                </div>

                <div>
                    <label for="date">Date</label>
                    <input 
                    type="date" 
                    id="date" 
                    name="date" 
                    required 
                    />
                </div>

                <button type="submit">Save Expense</button>
            </form>
        </div>

        <div class="expenses-list">
            <h2>Expenses List</h2>

            <ul>
                <li>
                    <div class="card">
                        <span class="expense-icon" aria-hidden="true">🥳</span>
                        <p>Description</p>
                        <h4>23€</h4>
                        <button class="delete-btn" type="button">Delete</button>
                    </div>
                </li>
                <li>
                    <div class="card">
                        <span class="expense-icon" aria-hidden="true">🥳</span>
                        <p>Description</p>
                        <h4>23€</h4>
                        <button class="delete-btn" type="button">Delete</button>
                    </div>
                </li>
                <li>
                    <div class="card">
                        <span class="expense-icon" aria-hidden="true">🥳</span>
                        <p>Description</p>
                        <h4>23€</h4>
                        <button class="delete-btn" type="button">Delete</button>
                    </div>
                </li>
                <li>
                    <div class="card">
                        <span class="expense-icon" aria-hidden="true">🥳</span>
                        <p>Description</p>
                        <h4>23€</h4>
                        <button class="delete-btn" type="button">Delete</button>
                    </div>
                </li>
                <li>
                    <div class="card">
                        <span class="expense-icon" aria-hidden="true">🥳</span>
                        <p>Description</p>
                        <h4>23€</h4>
                        <button class="delete-btn" type="button">Delete</button>
                    </div>
                </li>
                <li>
                    <div class="card">
                        <span class="expense-icon" aria-hidden="true">🥳</span>
                        <p>Description</p>
                        <h4>23€</h4>
                        <button class="delete-btn" type="button">Delete</button>
                    </div>
                </li>
               
            </ul>

        </div>

    </main>

</body>

</html>
